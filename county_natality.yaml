schema:
  type: bigquery
  specification: bigquery-schema
  tables:
  - name: county_natality
    type: table
    description: Table county_natality
    physicalName: '`nxs-tes-nxhmr-sbx-11462292.test_agent.county_natality`'
    columns:
    - name: Year
      type: date
      description: Représente l'année civile au cours de laquelle les naissances ont
        été enregistrées. Cette colonne est essentielle pour analyser les tendances
        temporelles de la natalité, comparer les statistiques d'une année sur l'autre
        et réaliser des projections démographiques. Les valeurs typiques sont des
        années récentes au format AAAA.
      businessName: Année de Naissance
      logicalType: date
      physicalType: DATE
      isNullable: true
      isUnique: false
      isPrimaryKey: false
      classification: internal
      pii: false
      tags: []
      examples:
      - '2018'
      - '2019'
      - '2020'
    - name: County_of_Residence
      type: string
      description: Désigne le nom du comté où réside officiellement la mère au moment
        de la naissance, ce qui peut différer du lieu réel de l'accouchement. Cette
        information est utilisée pour la cartographie démographique et l'allocation
        des ressources de santé publique au niveau local. Elle est directement liée
        à la colonne du code FIPS pour une identification sans ambiguïté.
      businessName: Comté de Résidence
      logicalType: string
      physicalType: STRING
      isNullable: true
      isUnique: false
      isPrimaryKey: false
      classification: internal
      pii: false
      tags: []
      examples:
      - Los Angeles County, CA
      - Cook County, IL
      - Miami-Dade County, FL
    - name: County_of_Residence_FIPS
      type: string
      description: Code standardisé (Federal Information Processing Standard) identifiant
        de manière unique le comté de résidence de la mère. Ce code numérique est
        crucial pour effectuer des jointures fiables avec d'autres bases de données
        gouvernementales, économiques ou géospatiales. Il comporte généralement 5
        chiffres, dont les deux premiers représentent l'état et les trois derniers
        le comté.
      businessName: Code FIPS du Comté
      logicalType: string
      physicalType: STRING
      isNullable: true
      isUnique: false
      isPrimaryKey: false
      classification: internal
      pii: false
      tags: []
      examples:
      - '06037'
      - '17031'
      - '12086'
    - name: Births
      type: integer
      description: Indique le nombre total de naissances vivantes recensées dans le
        comté pour l'année donnée. C'est l'indicateur de volume principal pour évaluer
        la dynamique de la population, calculer les taux de natalité et dimensionner
        les infrastructures de maternité ou de petite enfance. Les valeurs varient
        fortement de quelques dizaines à plusieurs dizaines de milliers selon la taille
        du comté.
      businessName: Nombre de Naissances
      logicalType: integer
      physicalType: INTEGER
      isNullable: true
      isUnique: false
      isPrimaryKey: false
      classification: internal
      pii: false
      tags: []
      examples:
      - '150'
      - '45230'
      - '1205'
    - name: Ave_Age_of_Mother
      type: float
      description: Représente l'âge moyen des mères au moment de l'accouchement pour
        un comté et une année spécifiques. Cette métrique permet d'étudier les comportements
        sociodémographiques, comme le recul de l'âge de la maternité, et d'évaluer
        les risques obstétricaux globaux d'une population. Les valeurs moyennes se
        situent généralement entre 25 et 32 ans.
      businessName: Âge Moyen de la Mère
      logicalType: float
      physicalType: FLOAT
      isNullable: true
      isUnique: false
      isPrimaryKey: false
      classification: internal
      pii: false
      tags: []
      examples:
      - '27.5'
      - '29.1'
      - '31.2'
    - name: Ave_OE_Gestational_Age_Wks
      type: float
      description: Mesure l'âge gestationnel moyen en semaines, calculé selon l'estimation
        obstétricale (OE - Obstetric Estimate). C'est la norme clinique actuelle la
        plus précise pour évaluer la durée de la grossesse et surveiller les taux
        de prématurité au sein d'une population. Les valeurs normales pour une grossesse
        à terme tournent autour de 38 à 40 semaines.
      businessName: Âge Gestationnel Moyen (Estimation Obstétricale)
      logicalType: float
      physicalType: FLOAT
      isNullable: true
      isUnique: false
      isPrimaryKey: false
      classification: internal
      pii: false
      tags: []
      examples:
      - '38.5'
      - '39.1'
      - '37.9'
    - name: Ave_LMP_Gestational_Age_Wks
      type: float
      description: Indique l'âge gestationnel moyen en semaines basé sur la date des
        dernières menstruations (LMP - Last Menstrual Period). Bien que souvent remplacée
        par l'estimation obstétricale (OE) qui est plus précise, cette donnée historique
        reste utilisée pour des études épidémiologiques comparatives à long terme.
        Les valeurs attendues sont proches de 39 semaines.
      businessName: Âge Gestationnel Moyen (Dernières Règles)
      logicalType: float
      physicalType: FLOAT
      isNullable: true
      isUnique: false
      isPrimaryKey: false
      classification: internal
      pii: false
      tags: []
      examples:
      - '38.7'
      - '39.2'
      - '38.1'
    - name: Ave_Birth_Weight_gms
      type: float
      description: Correspond au poids moyen des nouveau-nés à la naissance, exprimé
        en grammes. Cet indicateur de santé publique majeur permet d'identifier les
        zones géographiques présentant des risques de retards de croissance intra-utérins,
        de malnutrition ou de macrosomie. La moyenne standard se situe généralement
        entre 3200 et 3400 grammes.
      businessName: Poids Moyen à la Naissance (grammes)
      logicalType: float
      physicalType: FLOAT
      isNullable: true
      isUnique: false
      isPrimaryKey: false
      classification: internal
      pii: false
      tags: []
      examples:
      - '3250.5'
      - '3310.0'
      - '3195.2'
    - name: Ave_Pre_pregnancy_BMI
      type: float
      description: Représente l'Indice de Masse Corporelle (IMC) moyen des mères avant
        le début de leur grossesse. Cette donnée est utilisée par les autorités de
        santé pour corréler l'état de santé maternel initial avec les issues de grossesse,
        comme le poids du bébé ou les risques de complications. Les moyennes varient
        souvent entre 24 et 29 selon les régions.
      businessName: IMC Moyen Avant Grossesse
      logicalType: float
      physicalType: FLOAT
      isNullable: true
      isUnique: false
      isPrimaryKey: false
      classification: internal
      pii: false
      tags: []
      examples:
      - '25.4'
      - '26.8'
      - '28.1'
    - name: Ave_Number_of_Prenatal_Wks
      type: float
      description: Indique le nombre moyen de visites prénatales effectuées par les
        mères durant leur grossesse. C'est un indicateur clé de l'accès aux soins
        de santé maternelle, de la prévention des risques et du suivi médical dans
        un comté donné. Une grossesse bien suivie compte généralement entre 10 et
        14 visites prénatales.
      businessName: Nombre Moyen de Visites Prénatales
      logicalType: float
      physicalType: FLOAT
      isNullable: true
      isUnique: false
      isPrimaryKey: false
      classification: internal
      pii: false
      tags: []
      examples:
      - '11.2'
      - '12.5'
      - '9.8'
