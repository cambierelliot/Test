  dataplex:
    glossary:
    - term: FIPS
      definition: Acronyme pour Federal Information Processing Standard. Il s'agit
        d'un code numérique standardisé, généralement à 5 chiffres, utilisé par le
        gouvernement américain pour identifier de manière unique les comtés et entités
        géographiques équivalentes. Les deux premiers chiffres désignent l'état et
        les trois derniers le comté, ce qui est indispensable pour les jointures de
        bases de données géospatiales et gouvernementales.
      synonyms:
      - Code FIPS
      - FIPS Code
      - County Code
      - Identifiant de comté
      relatedTerms:
      - County_of_Residence
      - Comté
      - Géocodage
      category: géographie
      examples:
      - 06037 (Los Angeles County, CA)
      - 36061 (New York County, NY)
      - 48201 (Harris County, TX)
    - term: OE
      definition: Acronyme pour Obstetric Estimate (Estimation Obstétricale). C'est
        la méthode clinique de référence actuelle pour déterminer l'âge gestationnel
        d'un fœtus, combinant la date des dernières règles avec des examens échographiques
        précoces. Cette mesure est considérée comme beaucoup plus précise que la méthode
        traditionnelle basée uniquement sur les menstruations.
      synonyms:
      - Obstetric Estimate
      - Estimation obstétricale
      - OE Gestational Age
      relatedTerms:
      - Âge gestationnel
      - LMP
      - Prématurité
      category: santé
      examples:
      - 38.5 semaines
      - 39.2 semaines
    - term: LMP
      definition: Acronyme pour Last Menstrual Period (Date des dernières menstruations
        ou DDR en français). C'est la méthode historique de calcul de l'âge gestationnel
        qui se base sur le premier jour des dernières règles de la mère. Bien qu'utile
        pour les études épidémiologiques comparatives à long terme, elle est souvent
        sujette à des erreurs de mémorisation ou des cycles irréguliers.
      synonyms:
      - Last Menstrual Period
      - DDR
      - Date des dernières règles
      relatedTerms:
      - Âge gestationnel
      - OE
      - Semaines d'aménorrhée
      category: santé
      examples:
      - 39.0 semaines
      - 40.1 semaines
    - term: BMI
      definition: Acronyme pour Body Mass Index, traduit en français par Indice de
        Masse Corporelle (IMC). Dans le contexte de cette table, il s'agit de l'IMC
        moyen de la mère calculé avant le début de la grossesse (Pre-pregnancy BMI).
        Cet indicateur de santé publique permet d'évaluer les risques de complications
        obstétricales liés à la dénutrition, au surpoids ou à l'obésité maternelle.
      synonyms:
      - IMC
      - Indice de Masse Corporelle
      - Pre-pregnancy BMI
      - IMC pré-grossesse
      relatedTerms:
      - Poids à la naissance
      - Santé maternelle
      category: santé
      examples:
      - 24.5 (Poids normal)
      - 28.2 (Surpoids)
      - 31.0 (Obésité)
    - term: Âge gestationnel
      definition: Mesure de la durée de la grossesse, généralement exprimée en semaines
        complètes. Une grossesse à terme est comprise entre 37 et 42 semaines, tandis
        qu'une naissance survenant avant 37 semaines est qualifiée de prématurée.
        Dans cette base de données, il est évalué soit par estimation obstétricale
        (OE), soit par la date des dernières règles (LMP).
      synonyms:
      - Gestational Age
      - GA
      - Durée de grossesse
      - Semaines d'aménorrhée
      relatedTerms:
      - OE
      - LMP
      - Prématurité
      - Terme
      category: santé
      examples:
      - 39 semaines (À terme)
      - 34 semaines (Prématuré)
    - term: Poids à la naissance
      definition: Mesure de la masse corporelle du nouveau-né au moment de l'accouchement,
        exprimée ici en grammes (gms). C'est un indicateur fondamental de la santé
        publique infantile qui permet de détecter les retards de croissance intra-utérins,
        la prématurité ou les cas de macrosomie fœtale. Un poids normal à terme se
        situe généralement entre 2500g et 4000g.
      synonyms:
      - Birth Weight
      - Poids néonatal
      - Masse à la naissance
      relatedTerms:
      - BMI
      - Âge gestationnel
      - Macrosomie
      - Retard de croissance
      category: santé
      examples:
      - 3350 grammes
      - 2400 grammes (Faible poids)
      - 4100 grammes (Macrosomie)
    - term: Visites prénatales
      definition: Consultations médicales de suivi effectuées par la mère tout au
        long de sa grossesse. Le nombre moyen de visites est un indicateur clé de
        l'accès aux soins de santé maternelle, de la prévention des risques obstétricaux
        et de la qualité du suivi médical dans un comté. Un suivi standard et complet
        pour une grossesse sans complication comprend généralement entre 10 et 14
        visites.
      synonyms:
      - Prenatal Visits
      - Suivi de grossesse
      - Consultations prénatales
      - Prenatal Care
      relatedTerms:
      - Santé maternelle
      - Âge gestationnel
      category: santé
      examples:
      - 11.5 visites
      - 12.8 visites
    - term: Naissances vivantes
      definition: Nombre total d'enfants nés en vie au cours d'une année civile dans
        une zone géographique donnée (ici, le comté). Cet indicateur exclut les mortinaissances
        et les fausses couches, et sert de base au calcul des taux de natalité et
        de fécondité. C'est la métrique de volume principale pour les études démographiques
        et l'allocation des ressources.
      synonyms:
      - Live Births
      - Natalité
      - Naissances recensées
      relatedTerms:
      - Births
      - Taux de natalité
      - Démographie
      category: démographie
      examples:
      - 450 naissances
      - 12500 naissances
    - term: Âge maternel
      definition: Âge de la mère au moment de l'accouchement, exprimé en années. L'âge
        moyen des mères est un indicateur sociodémographique important qui reflète
        les tendances sociétales, comme le recul de l'âge de la première grossesse.
        Il permet également d'évaluer les risques médicaux globaux, les grossesses
        tardives (plus de 35 ans) ou très précoces étant statistiquement plus à risque.
      synonyms:
      - Age of Mother
      - Âge de la mère
      - Maternal Age
      relatedTerms:
      - Naissances vivantes
      - Santé maternelle
      - Démographie
      category: démographie
      examples:
      - 26.5 ans
      - 31.2 ans
    tags: []
  ai:
    embeddingModel: text-embedding-004
    sampleQueries:
    - question: Quel est le nombre total de naissances vivantes enregistrées dans
        le comté identifié par le code FIPS '06037' au fil des années ?
      sql: SELECT Year, SUM(Births) AS Total_Naissances_Vivantes FROM `nxs-tes-nxhmr-sbx-11462292.test_agent.county_natality`
        WHERE County_of_Residence_FIPS = '06037' GROUP BY Year ORDER BY Year DESC
      glossaryTermsUsed:
      - FIPS
      - Naissances vivantes
      explanation: Cette requête filtre les données sur un code FIPS spécifique pour
        identifier un comté unique et agrège les naissances vivantes par année pour
        observer l'évolution démographique.
    - question: Quels sont les 10 comtés ayant le poids à la naissance le plus faible
        en 2022, et quel est leur âge gestationnel moyen selon l'estimation obstétricale
        (OE) par rapport à la méthode LMP ?
      sql: SELECT County_of_Residence, Ave_Birth_Weight_gms, Ave_OE_Gestational_Age_Wks,
        Ave_LMP_Gestational_Age_Wks FROM `nxs-tes-nxhmr-sbx-11462292.test_agent.county_natality`
        WHERE EXTRACT(YEAR FROM Year) = 2022 ORDER BY Ave_Birth_Weight_gms ASC LIMIT
        10
      glossaryTermsUsed:
      - Poids à la naissance
      - Âge gestationnel
      - OE
      - LMP
      explanation: La requête trie les comtés par poids à la naissance ascendant pour
        une année précise et compare les deux méthodes de calcul de l'âge gestationnel
        (OE, plus précise, et LMP, historique).
    - question: Quelle est la moyenne de l'âge maternel dans les comtés où l'IMC pré-grossesse
        (BMI) moyen est supérieur à 29, indiquant une tendance au surpoids ?
      sql: SELECT County_of_Residence, AVG(Ave_Age_of_Mother) AS Age_Maternel_Moyen,
        AVG(Ave_Pre_pregnancy_BMI) AS BMI_Moyen FROM `nxs-tes-nxhmr-sbx-11462292.test_agent.county_natality`
        WHERE Ave_Pre_pregnancy_BMI > 29 GROUP BY County_of_Residence ORDER BY BMI_Moyen
        DESC
      glossaryTermsUsed:
      - Âge maternel
      - BMI
      explanation: Cette requête identifie les zones géographiques avec un IMC pré-grossesse
        élevé et calcule l'âge maternel moyen correspondant pour analyser de potentiels
        risques obstétricaux croisés.
    - question: Quels comtés présentent un suivi médical insuffisant avec moins de
        10 visites prénatales en moyenne, et quel est leur volume total de naissances
        vivantes ?
      sql: SELECT County_of_Residence, SUM(Births) AS Total_Naissances_Vivantes, AVG(Ave_Number_of_Prenatal_Wks)
        AS Moyenne_Visites_Prenatales FROM `nxs-tes-nxhmr-sbx-11462292.test_agent.county_natality`
        WHERE Ave_Number_of_Prenatal_Wks < 10 GROUP BY County_of_Residence ORDER BY
        Total_Naissances_Vivantes DESC
      glossaryTermsUsed:
      - Visites prénatales
      - Naissances vivantes
      explanation: La requête filtre les comtés ayant un suivi médical inférieur au
        standard recommandé (moins de 10 visites prénatales) et calcule la somme des
        naissances vivantes pour mesurer l'impact de ce déficit de suivi.
    - question: Quel est le poids à la naissance moyen et l'âge gestationnel (OE)
        moyen pour les populations où l'âge maternel moyen indique des grossesses
        tardives (plus de 35 ans) ?
      sql: SELECT AVG(Ave_Birth_Weight_gms) AS Poids_Naissance_Global_Moyen, AVG(Ave_OE_Gestational_Age_Wks)
        AS Age_Gestationnel_OE_Global_Moyen FROM `nxs-tes-nxhmr-sbx-11462292.test_agent.county_natality`
        WHERE Ave_Age_of_Mother > 35
      glossaryTermsUsed:
      - Poids à la naissance
      - Âge gestationnel
      - OE
      - Âge maternel
      explanation: Cette requête calcule les moyennes globales de poids et d'âge gestationnel
        basé sur l'estimation obstétricale (OE) pour la catégorie spécifique des mères
        dont l'âge moyen dépasse 35 ans.
  metricflow:
    semanticModel: null
    metrics: []
